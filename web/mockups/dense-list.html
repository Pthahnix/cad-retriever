<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CAD Retriever — Dense List</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #1a2530; background: #fff; }

  .wrap { max-width: 1000px; margin: 0 auto; padding: 2rem; }

  /* ---------- search bar ---------- */
  .topbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
  .topbar h1 { font-size: 1.2rem; margin: 0; white-space: nowrap; }
  .searchbox {
    flex: 1; display: flex; gap: .4rem; align-items: center;
    border: 1px solid #d4dce2; border-radius: 8px; padding: .3rem .3rem .3rem .7rem;
  }
  .searchbox:focus-within { border-color: #2a7; box-shadow: 0 0 0 3px rgba(34,170,119,.12); }
  .searchbox input[type=text] { flex: 1; border: none; font: inherit; outline: none; background: none; }

  /* upload buttons live inside the search box */
  .upload-btn {
    display: grid; place-items: center; width: 30px; height: 30px;
    border: none; background: none; border-radius: 6px; cursor: pointer; color: #8395a3;
  }
  .upload-btn:hover { background: #eef2f5; color: #2a7; }
  .upload-btn svg { width: 18px; height: 18px; }
  .divider { width: 1px; align-self: stretch; background: #e3e8ec; margin: .15rem .1rem; }

  .mode-tag { font-size: .72rem; color: #8395a3; padding: 0 .4rem; white-space: nowrap; }
  .go-btn { font: inherit; background: #2a7; color: #fff; border: none; border-radius: 6px; padding: .4rem 1rem; cursor: pointer; }
  .go-btn:hover { background: #239066; }

  /* preview chip shown after a file is chosen */
  .attach { display: none; align-items: center; gap: .4rem; margin-bottom: 1rem; font-size: .8rem; color: #5a6b78; }
  .attach.show { display: flex; }
  .attach img { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; border: 1px solid #d4dce2; }
  .attach .x { border: none; background: none; cursor: pointer; color: #a33; font-size: 1rem; line-height: 1; }

  /* ---------- table ---------- */
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  thead tr { text-align: left; color: #8395a3; font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; border-bottom: 2px solid #eef2f5; }
  th { padding: .6rem .5rem; }
  tbody tr { border-bottom: 1px solid #f0f3f5; cursor: pointer; }
  tbody tr:hover { background: #f7faf9; }
  td { padding: .45rem .5rem; }
  .score { font-weight: 700; color: #2a7; }
  .flag { font-size: .7rem; background: #fde2e2; color: #a33; border-radius: 4px; padding: .1rem .45rem; }
  .dash { color: #bcc7cf; }

  .thumb { width: 48px; height: 48px; border-radius: 6px; }
  .t-disc    { background: radial-gradient(circle at 50% 50%, #8fb0c8 0 38%, #b9cdda 40% 100%); }
  .t-bracket { background: linear-gradient(135deg, #c2d3df, #6f93ac); }
  .t-nut     { background: conic-gradient(from 30deg, #7c9cb5 0 16.6%, #aec3d3 0 33.3%, #7c9cb5 0 50%, #aec3d3 0 66.6%, #7c9cb5 0 83.3%, #aec3d3 0 100%); }
  .t-shaft   { background: linear-gradient(90deg, #b9cdda 0 32%, #7c9cb5 32% 68%, #b9cdda 68%); }
  .t-plate   { background: repeating-linear-gradient(90deg, #7c9cb5 0 9px, #c2d3df 9px 22px); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>CAD Retriever</h1>
    <div class="searchbox">
      <input type="text" id="q" value="flat disc with mounting holes" placeholder="描述一个 CAD 零件…" />

      <button class="upload-btn" id="sketch-btn" title="上传草图">
        <!-- pencil / sketch -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
      <button class="upload-btn" id="image-btn" title="上传图片">
        <!-- image -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="1.5"/><path d="m21 15-4.5-4.5L7 20"/></svg>
      </button>

      <div class="divider"></div>
      <span class="mode-tag" id="mode-tag">Text</span>
      <button class="go-btn" id="go">Go</button>

      <input type="file" id="sketch-file" accept="image/*" hidden />
      <input type="file" id="image-file" accept="image/*" hidden />
    </div>
  </div>

  <div class="attach" id="attach">
    <img id="attach-thumb" alt="" />
    <span id="attach-label"></span>
    <button class="x" id="attach-x" title="移除">✕</button>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:64px;"></th>
        <th>Caption</th>
        <th style="width:70px;">Score</th>
        <th style="width:70px;">Faces</th>
        <th style="width:60px;">Solids</th>
        <th style="width:80px;">Flags</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
const MODELS = [
  { id:"demo/0001", caption:"a flat cylindrical disc with a central through-hole and six evenly spaced mounting holes", shape:"disc",    score:0.94, probe:{n_faces:16,n_solids:1,quality_flags:[]} },
  { id:"demo/0002", caption:"an L-shaped mounting bracket with two perpendicular flat arms",                          shape:"bracket", score:0.89, probe:{n_faces:12,n_solids:1,quality_flags:[]} },
  { id:"demo/0003", caption:"a hexagonal nut with a central circular bore",                                          shape:"nut",     score:0.85, probe:{n_faces:9, n_solids:1,quality_flags:["non-watertight"]} },
  { id:"demo/0004", caption:"a stepped cylindrical shaft with two coaxial diameters",                                shape:"shaft",   score:0.81, probe:{n_faces:6, n_solids:1,quality_flags:[]} },
  { id:"demo/0005", caption:"a rectangular base plate reinforced with three parallel ribs",                          shape:"plate",   score:0.76, probe:{n_faces:30,n_solids:1,quality_flags:[]} },
];

document.getElementById("rows").innerHTML = MODELS.map(m => `<tr>
  <td><div class="thumb t-${m.shape}"></div></td>
  <td>${m.caption}</td>
  <td class="score">${m.score.toFixed(2)}</td>
  <td>${m.probe.n_faces}</td>
  <td>${m.probe.n_solids}</td>
  <td>${m.probe.quality_flags.length ? `<span class="flag">⚠</span>` : `<span class="dash">—</span>`}</td>
</tr>`).join("");

// ---- upload wiring (mockup: just preview the chosen file) ----
const attach = document.getElementById("attach");
const attachThumb = document.getElementById("attach-thumb");
const attachLabel = document.getElementById("attach-label");
const modeTag = document.getElementById("mode-tag");

function wireUpload(btnId, fileId, mode) {
  const file = document.getElementById(fileId);
  document.getElementById(btnId).onclick = () => file.click();
  file.onchange = () => {
    const f = file.files[0];
    if (!f) return;
    attachThumb.src = URL.createObjectURL(f);
    attachLabel.textContent = `${mode}：${f.name}`;
    modeTag.textContent = mode === "草图" ? "Sketch" : "Image";
    attach.classList.add("show");
  };
}
wireUpload("sketch-btn", "sketch-file", "草图");
wireUpload("image-btn",  "image-file",  "图片");

document.getElementById("attach-x").onclick = () => {
  attach.classList.remove("show");
  modeTag.textContent = "Text";
  document.getElementById("sketch-file").value = "";
  document.getElementById("image-file").value = "";
};
</script>
</body>
</html>
